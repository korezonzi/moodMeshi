services:
  - type: web
    name: moodmeshi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RAKUTEN_APP_ID
        sync: false
      - key: RAKUTEN_ACCESS_KEY
        sync: false
      - key: APP_ORIGIN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
