<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}MoodMeshi - 気分から料理を提案{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="logo">🍽️ MoodMeshi</a>
        <p class="tagline">あなたの気分に合わせた料理を提案します</p>
        <div class="header-actions">
          <button id="settings-btn" class="header-icon-btn" aria-label="設定">
            ⚙️
          </button>
        </div>
      </div>
    </header>
    <main class="container">{% block content %}{% endblock %}</main>
    <footer class="site-footer">
      <p>Powered by Claude AI × Rakuten Recipe</p>
    </footer>

    <!-- Toast notification -->
    <div id="toast-msg" class="toast-msg" hidden role="alert"></div>

    <!-- Settings overlay + modal -->
    <div id="settings-overlay" class="settings-overlay" hidden></div>
    <div
      id="settings-modal"
      class="settings-modal"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="settings-modal-title"
    >
      <div class="settings-modal-header">
        <h2 id="settings-modal-title">設定</h2>
        <button
          id="settings-close-btn"
          class="settings-close-btn"
          aria-label="閉じる"
        >
          ✕
        </button>
      </div>
      <div class="settings-modal-body">
        <p class="settings-db-note">
          <span
            id="settings-db-indicator"
            class="db-indicator db-indicator--loading"
            >⏳ DB確認中...</span
          >
          設定はデータベースに保存され、次回の提案に自動で反映されます。
        </p>
        <div class="settings-field">
          <label for="allergy-input">アレルギー・避けたい食材</label>
          <textarea
            id="allergy-input"
            placeholder="例: えび、そば、ピーナッツ"
            rows="3"
          ></textarea>
        </div>
        <div class="settings-field">
          <label for="preference-input">好み・食事制限</label>
          <textarea
            id="preference-input"
            placeholder="例: 辛いものが苦手、ベジタリアン"
            rows="3"
          ></textarea>
        </div>
        <button id="settings-save-btn" class="settings-save-btn">
          保存する
        </button>
        <p id="settings-status" class="settings-status"></p>
      </div>
    </div>

    <script>
      // Global toast notification
      function showToast(msg, type) {
        const el = document.getElementById("toast-msg");
        el.textContent = msg;
        el.className = "toast-msg toast-msg--" + (type || "info");
        el.hidden = false;
        clearTimeout(el._timer);
        el._timer = setTimeout(function () {
          el.hidden = true;
        }, 3000);
      }

      (function () {
        const btn = document.getElementById("settings-btn");
        const overlay = document.getElementById("settings-overlay");
        const modal = document.getElementById("settings-modal");
        const closeBtn = document.getElementById("settings-close-btn");
        const saveBtn = document.getElementById("settings-save-btn");
        const statusEl = document.getElementById("settings-status");
        const dbIndicator = document.getElementById("settings-db-indicator");

        function openModal() {
          overlay.hidden = false;
          modal.hidden = false;
          statusEl.textContent = "";
        }

        function closeModal() {
          overlay.hidden = true;
          modal.hidden = true;
        }

        btn.addEventListener("click", async function () {
          openModal();
          dbIndicator.textContent = "⏳ DB確認中...";
          dbIndicator.className = "db-indicator db-indicator--loading";
          try {
            const res = await fetch("/preferences");
            if (res.ok) {
              const data = await res.json();
              document.getElementById("allergy-input").value =
                data.allergy_notes || "";
              document.getElementById("preference-input").value =
                data.preference_notes || "";
              if (data.db_available) {
                dbIndicator.textContent = "🗄 DB接続済み";
                dbIndicator.className = "db-indicator db-indicator--ok";
              } else {
                dbIndicator.textContent = "⚠️ DB未設定";
                dbIndicator.className = "db-indicator db-indicator--warn";
              }
            } else {
              dbIndicator.textContent = "❌ DB接続エラー";
              dbIndicator.className = "db-indicator db-indicator--error";
            }
          } catch (_) {
            dbIndicator.textContent = "❌ 通信エラー";
            dbIndicator.className = "db-indicator db-indicator--error";
          }
        });

        overlay.addEventListener("click", closeModal);
        closeBtn.addEventListener("click", closeModal);

        saveBtn.addEventListener("click", async function () {
          const allergy_notes = document.getElementById("allergy-input").value;
          const preference_notes =
            document.getElementById("preference-input").value;
          statusEl.textContent = "保存中...";
          statusEl.style.color = "var(--color-text-muted)";
          try {
            const res = await fetch("/preferences", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ allergy_notes, preference_notes }),
            });
            const data = await res.json();
            if (data.ok) {
              statusEl.textContent = "✓ データベースに保存しました";
              statusEl.style.color = "#16a34a";
              dbIndicator.textContent = "🗄 DB接続済み";
              dbIndicator.className = "db-indicator db-indicator--ok";
              setTimeout(closeModal, 1000);
            } else {
              statusEl.textContent = "DB未設定のため保存できません";
              statusEl.style.color = "#dc2626";
              dbIndicator.textContent = "⚠️ DB未設定";
              dbIndicator.className = "db-indicator db-indicator--warn";
            }
          } catch (_) {
            statusEl.textContent = "通信エラーが発生しました";
            statusEl.style.color = "#dc2626";
          }
        });
      })();
    </script>
  </body>
</html>
